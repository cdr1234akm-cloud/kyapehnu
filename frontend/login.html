<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kya Pehnu?</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 72'><path d='M32 4 C32 4 32 8 32 9' stroke='%23D4A017' stroke-width='1.5' stroke-linecap='round'/><path d='M26 9 Q32 6 38 9' stroke='%23D4A017' stroke-width='1.5' stroke-linecap='round' fill='none'/><path d='M25 10 C23 12 21 16 20 20 L24 22 L32 20 L40 22 L44 20 C43 16 41 12 39 10 Q35 8 32 9 Q29 8 25 10Z' fill='%23D4A017' opacity='0.9'/><path d='M24 22 C24 24 26 26 28 27 L32 28 L36 27 C38 26 40 24 40 22' fill='%23D4A017' opacity='0.85'/><path d='M28 27 C24 32 14 50 12 66 L52 66 C50 50 40 32 36 27 C36 27 34 28 32 28 C30 28 28 27 28 27Z' fill='%23D4A017' opacity='0.75'/></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-card">
        <!-- Logo -->
        <div class="text-center" style="margin-bottom:28px">
            <a href="index.html" class="navbar-brand">
                <svg width="24" height="28" viewBox="0 0 64 72" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M32 4 C32 4 32 8 32 9" stroke="var(--accent-primary)" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M26 9 Q32 6 38 9" stroke="var(--accent-primary)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
                    <path d="M25 10 C23 12 21 16 20 20 L24 22 L32 20 L40 22 L44 20 C43 16 41 12 39 10 Q35 8 32 9 Q29 8 25 10Z" fill="var(--accent-primary)" opacity="0.9"/>
                    <path d="M24 22 C24 24 26 26 28 27 L32 28 L36 27 C38 26 40 24 40 22" fill="var(--accent-primary)" opacity="0.85"/>
                    <path d="M28 27 C24 32 14 50 12 66 L52 66 C50 50 40 32 36 27 C36 27 34 28 32 28 C30 28 28 27 28 27Z" fill="var(--accent-primary)" opacity="0.75"/>
                </svg>
                <span style="font-family: var(--font-display); font-weight: 500;">Kya Pehnu?</span>
            </a>
            <h2 style="font-size:1.6rem">
                <span class="text-gradient">Kya Pehnu?</span>
            </h2>
            <p class="text-muted" style="font-size:0.9rem; margin-top:4px">
                Your AI Personal Stylist
            </p>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Sign In</button>
            <button class="auth-tab" data-tab="register">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="loginEmail" class="input" placeholder="you@example.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="loginPassword" class="input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px">
                Sign In
            </button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" style="display:none">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="regName" class="input" placeholder="Your name" required>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="regEmail" class="input" placeholder="you@example.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="regPassword" class="input" placeholder="At least 6 characters" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px">
                Create Account
            </button>
        </form>

        <p class="text-center text-muted" style="margin-top:20px; font-size:0.8rem">
            By continuing you agree to our Terms of Service
        </p>
    </div>
</div>

<script src="js/app.js"></script>
<script>initAuthPage();</script>
</body>
</html>
