<div class="profile-page">
    <div class="container" style="max-width:700px">

        <!-- Profile Header -->
        <div class="profile-header-card" style="margin-top:30px">
            <div class="profile-avatar-large" id="profileAvatar">U</div>
            <div>
                <h2 id="profileName" style="font-family:var(--font-body);font-size:1.4rem">Loading...</h2>
                <p class="text-muted" id="profileEmail">loading...</p>
                <span class="badge badge-primary" style="margin-top:8px">Free Plan</span>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="statTotal">-</div>
                <div class="stat-label">Total Items</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statTypes">-</div>
                <div class="stat-label">Categories</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statColors">-</div>
                <div class="stat-label">Colors</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statFormality">-</div>
                <div class="stat-label">Avg Formality</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statCached">-</div>
                <div class="stat-label">Cached Combos</div>
            </div>
        </div>

        <!-- Settings -->
        <div class="settings-section">
            <h3>Profile Settings</h3>
            <form id="settingsForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="settingName" class="input" placeholder="Your name">
                </div>
                <div class="input-group">
                    <label>Gender</label>
                    <select id="settingGender" class="input">
                        <option value="">Select</option>
                        <option value="female">Female</option>
                        <option value="male">Male</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Body Type</label>
                    <select id="settingBody" class="input">
                        <option value="">Select</option>
                        <option value="slim">Slim</option>
                        <option value="regular">Regular</option>
                        <option value="athletic">Athletic</option>
                        <option value="curvy">Curvy</option>
                        <option value="plus">Plus</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Skin Tone</label>
                    <select id="settingSkin" class="input">
                        <option value="">Select</option>
                        <option value="light">Light</option>
                        <option value="fair">Fair</option>
                        <option value="medium">Medium</option>
                        <option value="olive">Olive</option>
                        <option value="brown">Brown</option>
                        <option value="dark">Dark</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top:8px">
                    Save Changes
                </button>
            </form>
        </div>

        <!-- Danger Zone -->
        <div class="settings-section" style="margin-top:24px; margin-bottom:60px">
            <h3>Account</h3>
            <div class="settings-row">
                <div>
                    <strong>Log Out</strong>
                    <p class="text-muted" style="font-size:0.85rem">Sign out of your account</p>
                </div>
                <button class="btn btn-sm btn-danger" onclick="logout()">Log Out</button>
            </div>
            <!-- Add this after existing settings rows -->
            <div class="settings-row">
                <div>
                    <strong>Theme</strong>
                    <p class="text-muted" style="font-size:0.85rem">Switch between dark and light mode</p>
                </div>
                
            </div>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
<script>initProfile();</script>
<button class="btn btn-sm btn-secondary" style=" position: fixed;
